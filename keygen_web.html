<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0d1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>管理控制台 · License Manager</title>
  <style>
    /* ============== Design Tokens — Dark Glass Morphism ============== */
    :root {
      --brand-1: #6366f1;
      --brand-2: #8b5cf6;
      --brand-3: #ec4899;
      --accent: #06b6d4;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;

      --bg-root: #0a0d1a;
      --bg-sidebar: #0f1328;
      --bg-card: rgba(19, 23, 52, 0.7);
      --bg-elevated: #1c2148;
      --bg-hover: rgba(37, 43, 92, 0.6);
      --bg-input: rgba(15, 22, 45, 0.7);
      --bg-toast: #1c2148;

      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --text-muted: #64748b;
      --text-dim: #475569;

      --border: rgba(255,255,255,0.07);
      --border-strong: rgba(255,255,255,0.14);
      --border-brand: rgba(139,92,246,0.35);

      --radius-sm: 8px;
      --radius: 12px;
      --radius-lg: 18px;
      --radius-xl: 24px;

      --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
      --shadow-card: 0 8px 32px rgba(0,0,0,0.35), 0 0 1px var(--border-brand);
      --shadow-glow: 0 0 40px rgba(139,92,246,0.25);
      --shadow-toast: 0 12px 40px rgba(0,0,0,0.5);

      --grad-brand: linear-gradient(135deg, #6366f1 0%, #8b5cf6 45%, #ec4899 100%);
      --grad-sidebar: linear-gradient(180deg, #0f1328 0%, #0a0d1a 100%);
      --grad-card-hover: linear-gradient(145deg, rgba(28,33,72,0.6) 0%, rgba(19,23,52,0.8) 100%);

      --font-mono: 'SF Mono', 'Cascadia Code', 'JetBrains Mono', Consolas, monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;

      --sidebar-w: 240px;
      --topbar-h: 56px;
      --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: var(--font-sans);
      background: var(--bg-root);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Background glow orbs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 600px; height: 600px;
      background: rgba(99,102,241,0.08);
      top: -200px; right: -200px;
    }
    body::after {
      width: 400px; height: 400px;
      background: rgba(139,92,246,0.06);
      bottom: -100px; left: -100px;
    }

    /* ============== Scrollbar ============== */
    ::-webkit-scrollbar { width:6px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:var(--text-dim); border-radius:3px; }
    ::-webkit-scrollbar-thumb:hover { background:var(--text-muted); }

    /* ============== LOGIN PAGE ============== */
    #login-page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      position: relative;
      z-index: 1;
    }
    #login-page.hidden { display:none; }

    .login-card {
      background: var(--bg-card);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow-card);
      text-align: center;
      animation: fadeUp 0.5s ease;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(20px); }
      to { opacity:1; transform:translateY(0); }
    }

    .login-logo {
      width: 56px; height: 56px;
      margin: 0 auto 20px;
      border-radius: 16px;
      background: var(--grad-brand);
      display: flex; align-items:center; justify-content:center;
      font-size: 24px;
      box-shadow: var(--shadow-glow);
    }
    .login-card h1 {
      font-size: 22px; font-weight: 700;
      margin-bottom: 6px;
      background: var(--grad-brand);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .login-card p {
      font-size: 13px; color: var(--text-muted);
      margin-bottom: 32px;
    }

    .form-group {
      text-align: left;
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      font-size: 12px; font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .form-group input {
      width: 100%; padding: 12px 16px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 15px;
      font-family: var(--font-sans);
      transition: all var(--transition);
      outline: none;
    }
    .form-group input:focus {
      border-color: var(--brand-2);
      box-shadow: 0 0 0 3px rgba(139,92,246,0.15);
    }
    .form-group input::placeholder { color: var(--text-dim); }

    .login-error {
      color: var(--danger);
      font-size: 13px;
      margin-bottom: 12px;
      min-height: 20px;
    }

    .btn {
      display: inline-flex; align-items:center; justify-content:center;
      gap: 8px; padding: 12px 24px;
      font-size: 14px; font-weight: 600;
      font-family: var(--font-sans);
      border: none; border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all var(--transition);
      outline: none;
    }
    .btn:disabled { opacity:0.5; cursor:not-allowed; }
    .btn-primary {
      width: 100%; padding: 14px;
      background: var(--grad-brand);
      color: #fff;
      font-size: 15px;
      box-shadow: 0 4px 16px rgba(139,92,246,0.3);
    }
    .btn-primary:hover:not(:disabled) {
      box-shadow: 0 6px 24px rgba(139,92,246,0.5);
      transform: translateY(-1px);
    }
    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background:var(--bg-hover); color:var(--text-primary); }
    .btn-sm { padding:6px 12px; font-size:12px; border-radius:6px; }
    .btn-danger { background:var(--danger); color:#fff; }
    .btn-danger:hover { filter:brightness(1.2); }
    .btn-accent { background:var(--accent); color:#fff; font-size:13px; padding:10px 20px; border-radius:8px; }
    .btn-accent:hover { filter:brightness(1.15); }

    /* ============== MAIN LAYOUT ============== */
    #main-layout { display:none; position:relative; z-index:1; }
    #main-layout.active { display:flex; min-height:100vh; }

    /* Sidebar */
    .sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--grad-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top:0; left:0; bottom:0;
      z-index: 100;
      transition: transform var(--transition);
    }

    .sidebar-header {
      padding: 24px 20px 16px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-logo {
      display: flex; align-items:center; gap:10px;
    }
    .sidebar-logo .icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: var(--grad-brand);
      display: flex; align-items:center; justify-content:center;
      font-size: 16px;
    }
    .sidebar-logo h2 {
      font-size: 15px; font-weight: 700;
      background: var(--grad-brand);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .sidebar-nav {
      flex:1; overflow-y:auto;
      padding: 12px 10px;
    }
    .nav-section {
      margin-bottom: 6px;
    }
    .nav-section-title {
      font-size: 10px; font-weight:700;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 8px 12px 6px;
    }
    .nav-item {
      display: flex; align-items:center; gap:10px;
      padding: 10px 12px;
      margin: 2px 0;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all var(--transition);
      font-size: 13px; font-weight: 500;
      color: var(--text-muted);
      border: none; background: none; width: 100%;
      text-align: left;
      font-family: var(--font-sans);
    }
    .nav-item:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }
    .nav-item.active {
      background: rgba(139,92,246,0.15);
      color: var(--brand-2);
      font-weight: 600;
    }
    .nav-item .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--text-dim);
      transition: all var(--transition);
    }
    .nav-item.active .dot {
      background: var(--brand-2);
      box-shadow: 0 0 8px rgba(139,92,246,0.5);
    }
    .nav-item .badge {
      margin-left: auto;
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 10px;
      background: rgba(139,92,246,0.2);
      color: var(--brand-2);
    }

    .sidebar-footer {
      padding: 12px 10px;
      border-top: 1px solid var(--border);
    }
    .sidebar-footer .user-info {
      display: flex; align-items:center; gap:8px;
      padding: 8px 12px;
      font-size: 12px; color: var(--text-secondary);
    }
    .sidebar-footer .logout-btn {
      display: flex; align-items:center; gap:6px;
      padding: 8px 12px; width: 100%;
      border: none; background: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 12px; color: var(--text-muted);
      font-family: var(--font-sans);
      transition: all var(--transition);
    }
    .sidebar-footer .logout-btn:hover {
      background: rgba(239,68,68,0.1);
      color: var(--danger);
    }

    /* Content */
    .main-content {
      flex:1;
      margin-left: var(--sidebar-w);
      padding: 28px 32px 40px;
      min-width: 0;
    }

    /* Top bar */
    .topbar {
      display: flex; align-items:center; justify-content:space-between;
      margin-bottom: 28px;
      flex-wrap:wrap; gap:12px;
    }
    .topbar .page-title {
      font-size: 24px; font-weight: 700;
    }
    .topbar .breadcrumb {
      font-size: 12px; color: var(--text-muted);
    }
    .topbar .breadcrumb span { color: var(--text-secondary); }

    /* Module loading */
    .module-panel { display:none; animation: fadeUp 0.3s ease; }
    .module-panel.active { display:block; }

    /* ============== Dashboard / Cards ============== */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 18px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px 24px;
      transition: all var(--transition);
    }
    .stat-card:hover {
      border-color: var(--border-brand);
      background: var(--grad-card-hover);
    }
    .stat-card .card-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      display: flex; align-items:center; justify-content:center;
      font-size: 18px;
      margin-bottom: 12px;
    }
    .stat-card .card-value {
      font-size: 28px; font-weight: 700;
      margin-bottom: 4px;
    }
    .stat-card .card-label {
      font-size: 12px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing:0.5px;
    }

    /* ============== Sub-tabs ============== */
    .sub-tabs {
      display: flex; gap:4px;
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 4px;
      margin-bottom: 24px;
      overflow-x: auto;
    }
    .sub-tab {
      flex:1; min-width:0;
      padding: 10px 16px;
      border: none; background: none;
      border-radius: calc(var(--radius-lg) - 4px);
      font-size: 13px; font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      font-family: var(--font-sans);
      transition: all var(--transition);
      white-space: nowrap;
    }
    .sub-tab:hover { color: var(--text-primary); background: var(--bg-hover); }
    .sub-tab.active {
      background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(139,92,246,0.15));
      color: var(--text-primary);
      font-weight: 600;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .sub-panel { display:none; animation:fadeUp 0.25s ease; }
    .sub-panel.active { display:block; }

    /* ============== Panel Cards ============== */
    .panel-card {
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px;
    }
    .panel-card h3 {
      font-size: 16px; font-weight: 700;
      margin-bottom: 20px;
      display: flex; align-items:center; gap:8px;
    }
    .panel-card textarea, .panel-card input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 13px;
      outline: none;
      transition: all var(--transition);
      resize: vertical;
    }
    .panel-card textarea:focus, .panel-card input[type="text"]:focus {
      border-color: var(--brand-2);
      box-shadow: 0 0 0 3px rgba(139,92,246,0.12);
    }
    .panel-card textarea { min-height:100px; }
    .panel-card select {
      padding: 10px 14px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 13px;
      font-family: var(--font-sans);
      cursor: pointer;
      outline: none;
    }
    .form-row {
      display: flex; gap:12px; align-items:flex-end;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .form-row .form-group { flex:1; min-width:140px; }

    /* Result area */
    .result-box {
      margin-top: 16px;
      padding: 16px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.6;
      max-height: 300px; overflow-y: auto;
    }

    /* Table */
    .table-wrap {
      overflow-x: auto;
      margin-top: 12px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      padding: 10px 12px; text-align: left;
      border-bottom: 1px solid var(--border);
    }
    th {
      font-size: 11px; font-weight: 700;
      color: var(--text-muted); text-transform: uppercase;
      letter-spacing: 0.5px;
      background: rgba(15,22,45,0.5);
      position: sticky; top:0; z-index:1;
    }
    td { color: var(--text-secondary); }
    tr:hover td { background: rgba(139,92,246,0.04); }
    .code {
      font-family: var(--font-mono);
      color: var(--accent);
      font-size: 12px;
    }

    /* Pagination */
    .pagination {
      display: flex; align-items:center; justify-content:center;
      gap: 8px; margin-top: 16px;
    }
    .pagination button {
      padding: 6px 12px;
      background: var(--bg-hover);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 12px; font-family: var(--font-sans);
    }
    .pagination button:hover { background:rgba(139,92,246,0.15); color:var(--text-primary); }
    .pagination button:disabled { opacity:0.3; }
    .pagination span { font-size:12px; color:var(--text-muted); }

    /* Labels / badges */
    .label { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600; }
    .label-trial { background:rgba(245,158,11,0.15); color:var(--warning); }
    .label-standard { background:rgba(6,182,212,0.15); color:var(--accent); }
    .label-lifetime { background:rgba(16,185,129,0.15); color:var(--success); }

    /* Toast */
    .toast-container {
      position: fixed; top:20px; right:20px; z-index:9999;
      display:flex; flex-direction:column; gap:8px;
    }
    .toast {
      padding: 12px 20px;
      background: var(--bg-toast);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm);
      font-size: 13px;
      color: var(--text-primary);
      box-shadow: var(--shadow-toast);
      animation: slideIn 0.3s ease;
      max-width: 360px;
    }
    .toast.success { border-left: 3px solid var(--success); }
    .toast.error { border-left: 3px solid var(--danger); }
    @keyframes slideIn {
      from { opacity:0; transform:translateX(40px); }
      to { opacity:1; transform:translateX(0); }
    }

    /* Mobile hamburger */
    .mobile-toggle {
      display:none;
      position:fixed; top:12px; left:12px; z-index:200;
      width:40px; height:40px;
      background:var(--bg-card);
      border:1px solid var(--border);
      border-radius:10px;
      color:var(--text-primary);
      font-size:20px;
      cursor:pointer;
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
    }

    /* ============== Responsive ============== */
    @media (max-width: 768px) {
      .mobile-toggle { display:flex; align-items:center; justify-content:center; }
      .sidebar {
        transform: translateX(-100%);
        box-shadow: var(--shadow-lg);
      }
      .sidebar.open { transform:translateX(0); }
      .main-content {
        margin-left: 0;
        padding: 64px 16px 32px;
      }
      .login-card { padding:32px 24px 28px; }
      .topbar { flex-direction:column; align-items:flex-start; }
      .topbar .page-title { font-size:20px; }
      .cards-grid { grid-template-columns:1fr; }
      .sub-tabs { padding:3px; }
      .sub-tab { font-size:12px; padding:8px 10px; }
      .form-row { flex-direction:column; }
    }

    @media (max-width: 480px) {
      .login-card { padding:24px 18px 20px; }
      .panel-card { padding:18px 14px; }
    }

    /* Page title with module badge */
    .module-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(139,92,246,0.15));
      color: var(--brand-2);
      margin-left: 10px;
      vertical-align: middle;
    }
  </style>
</head>
<body>

<!-- ==================== TOAST CONTAINER ==================== -->
<div class="toast-container" id="toast"></div>

<!-- ==================== LOGIN PAGE ==================== -->
<div id="login-page">
  <div class="login-card">
    <div class="login-logo">&#128274;</div>
    <h1>管理控制台</h1>
    <p>License Manager &mdash; 设备授权管理中心</p>
    <form id="login-form" autocomplete="off">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="login-user" placeholder="请输入用户名" value="admin" autocomplete="username">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="login-pass" placeholder="请输入密码" autocomplete="current-password">
      </div>
      <div class="login-error" id="login-error"></div>
      <button type="submit" class="btn btn-primary" id="login-btn">登 录</button>
    </form>
  </div>
</div>

<!-- ==================== MAIN LAYOUT ==================== -->
<div id="main-layout">
  <!-- Mobile toggle -->
  <button class="mobile-toggle" id="mobile-toggle">&#9776;</button>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div class="icon">&#128274;</div>
        <h2>管理控制台</h2>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-title">功能模块</div>
        <button class="nav-item active" data-module="nvr">
          <span class="dot"></span>
          <span>NVR 注册机</span>
          <span class="badge">active</span>
        </button>
      </div>
      <div class="nav-section">
        <div class="nav-section-title">更多工具</div>
        <button class="nav-item" data-module="dashboard">
          <span class="dot"></span>
          <span>概览面板</span>
        </button>
        <button class="nav-item" style="opacity:0.4;pointer-events:none;" title="即将上线">
          <span class="dot"></span>
          <span>即将上线</span>
        </button>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info" id="sidebar-user">admin</div>
      <button class="logout-btn" id="logout-btn">&#128682; 退出登录</button>
    </div>
  </aside>

  <!-- Main content -->
  <main class="main-content" id="main-content">
    <!-- ===== Dashboard ===== -->
    <div class="module-panel active" id="module-dashboard">
      <div class="topbar">
        <div>
          <div class="breadcrumb">首页 <span>/ 概览</span></div>
          <div class="page-title">概览面板</div>
        </div>
      </div>
      <div class="cards-grid">
        <div class="stat-card">
          <div class="card-icon" style="background:linear-gradient(135deg,rgba(99,102,241,0.2),rgba(139,92,246,0.15));">&#128273;</div>
          <div class="card-value" id="stat-total">--</div>
          <div class="card-label">已生成注册码</div>
        </div>
        <div class="stat-card">
          <div class="card-icon" style="background:linear-gradient(135deg,rgba(6,182,212,0.2),rgba(6,182,212,0.1));">&#9203;</div>
          <div class="card-value" id="stat-recent">--</div>
          <div class="card-label">最近 7 天生成</div>
        </div>
        <div class="stat-card">
          <div class="card-icon" style="background:linear-gradient(135deg,rgba(139,92,246,0.2),rgba(99,102,241,0.1));">&#10004;</div>
          <div class="card-value" id="stat-last">--</div>
          <div class="card-label">最新生成记录</div>
        </div>
      </div>
      <div class="panel-card" style="text-align:center;padding:48px;">
        <p style="color:var(--text-muted);margin-bottom:12px;">快速导航到功能模块</p>
        <button class="btn-accent" onclick="switchModule('nvr')">前往 NVR 注册机 &#8594;</button>
      </div>
    </div>

    <!-- ===== NVR Module ===== -->
    <div class="module-panel" id="module-nvr">
      <div class="topbar">
        <div>
          <div class="breadcrumb">首页 <span>/ NVR 注册机</span></div>
          <div class="page-title">NVR 注册机<span class="module-badge">NVR</span></div>
        </div>
      </div>
      <div class="sub-tabs" id="nvr-tabs">
        <button class="sub-tab active" data-panel="gen">&#128273; 生成注册码</button>
        <button class="sub-tab" data-panel="batch">&#128196; 批量生成</button>
        <button class="sub-tab" data-panel="verify">&#128270; 验证注册码</button>
        <button class="sub-tab" data-panel="history">&#128214; 历史记录</button>
      </div>

      <!-- Panel: Generate -->
      <div class="sub-panel active" id="panel-gen">
        <div class="panel-card">
          <h3>&#128273; 生成注册码</h3>
          <div class="form-row">
            <div class="form-group">
              <label>机器码 (16位HEX)</label>
              <input type="text" id="gen-mc" placeholder="例: A1B2C3D4E5F67890" maxlength="16">
            </div>
            <div class="form-group" style="max-width:160px;">
              <label>授权类型</label>
              <select id="gen-type">
                <option value="trial">试用版 (7天)</option>
                <option value="standard">标准版 (365天)</option>
                <option value="lifetime" selected>终身版</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group" style="max-width:200px;">
              <label>备注</label>
              <input type="text" id="gen-operator" placeholder="操作人/备注">
            </div>
          </div>
          <button class="btn-accent" onclick="doGenerate()">生成注册码</button>
          <div class="result-box" id="gen-result" style="display:none;"></div>
        </div>
      </div>

      <!-- Panel: Batch -->
      <div class="sub-panel" id="panel-batch">
        <div class="panel-card">
          <h3>&#128196; 批量生成</h3>
          <p style="font-size:12px;color:var(--text-muted);margin-bottom:12px;">每行一个机器码，支持带分隔符</p>
          <div class="form-row">
            <div class="form-group" style="max-width:160px;">
              <label>授权类型</label>
              <select id="batch-type">
                <option value="trial">试用版</option>
                <option value="standard">标准版</option>
                <option value="lifetime" selected>终身版</option>
              </select>
            </div>
            <div class="form-group" style="max-width:200px;">
              <label>备注</label>
              <input type="text" id="batch-operator" placeholder="操作人/备注">
            </div>
          </div>
          <textarea id="batch-codes" placeholder="A1B2C3D4E5F67890&#10;1234-5678-9ABC-DEF0&#10;...&#10;"></textarea>
          <button class="btn-accent" onclick="doBatch()" style="margin-top:12px;">批量生成</button>
          <div class="result-box" id="batch-result" style="display:none;"></div>
        </div>
      </div>

      <!-- Panel: Verify -->
      <div class="sub-panel" id="panel-verify">
        <div class="panel-card">
          <h3>&#128270; 验证注册码</h3>
          <div class="form-row">
            <div class="form-group">
              <label>机器码</label>
              <input type="text" id="verify-mc" placeholder="16位机器码">
            </div>
            <div class="form-group">
              <label>注册码</label>
              <input type="text" id="verify-key" placeholder="XXXX-XXXX-XXXX-XXXX">
            </div>
          </div>
          <button class="btn-accent" onclick="doVerify()">验证</button>
          <div class="result-box" id="verify-result" style="display:none;"></div>
        </div>
      </div>

      <!-- Panel: History -->
      <div class="sub-panel" id="panel-history">
        <div class="panel-card">
          <h3>&#128214; 历史记录</h3>
          <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;">
            <button class="btn btn-ghost btn-sm" onclick="doExport()">&#128190; 导出 CSV</button>
            <button class="btn btn-ghost btn-sm btn-danger" onclick="doClear()">&#128465; 清空记录</button>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>#</th><th>机器码</th><th>注册码</th><th>类型</th><th>有效期</th><th>备注</th><th>时间</th><th>操作</th>
                </tr>
              </thead>
              <tbody id="history-tbody"></tbody>
            </table>
          </div>
          <div class="pagination" id="history-pager"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
// ==================== STATE ====================
var TOKEN = localStorage.getItem('kg_token') || null;
var USER = localStorage.getItem('kg_user') || null;
var ACTIVE_MODULE = 'nvr';
var HIST_PAGE = 1, HIST_SIZE = 20;
var API_BASE = '';

// ==================== TOAST ====================
function toast(msg, type) {
  type = type || '';
  var el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  document.getElementById('toast').appendChild(el);
  setTimeout(function(){ el.style.opacity='0'; el.style.transition='opacity 0.3s';
    setTimeout(function(){ el.remove(); },300); },2800);
}

// ==================== API ====================
function apiPost(path, body) {
  var headers = { 'Content-Type':'application/json' };
  if (TOKEN) headers['Authorization'] = 'Bearer ' + TOKEN;
  return fetch(path, {
    method:'POST', headers:headers,
    body: JSON.stringify(body || {})
  }).then(function(r){ return r.json(); });
}

// ==================== LOGIN ====================
document.getElementById('login-form').addEventListener('submit', function(e){
  e.preventDefault();
  var u = document.getElementById('login-user').value.trim();
  var p = document.getElementById('login-pass').value;
  var btn = document.getElementById('login-btn');
  var err = document.getElementById('login-error');
  if (!u || !p) { err.textContent = '请输入用户名和密码'; return; }
  btn.disabled = true; btn.textContent = '登录中...'; err.textContent = '';
  apiPost('/api/login', { username: u, password: p }).then(function(r){
    if (r.ok) {
      TOKEN = r.token; USER = r.username || u;
      localStorage.setItem('kg_token', TOKEN);
      localStorage.setItem('kg_user', USER);
      showMain();
    } else {
      err.textContent = r.error || '登录失败';
    }
  }).catch(function(){
    err.textContent = '网络错误，请重试';
  }).finally(function(){
    btn.disabled = false; btn.textContent = '登 录';
  });
});

// ==================== LOGOUT ====================
function doLogout() {
  apiPost('/api/logout', {}).then(function(){});
  TOKEN = null; USER = null;
  localStorage.removeItem('kg_token');
  localStorage.removeItem('kg_user');
  showLogin();
}

// ==================== PAGE SWITCH ====================
function showLogin() {
  document.getElementById('login-page').classList.remove('hidden');
  document.getElementById('main-layout').classList.remove('active');
}
function showMain() {
  document.getElementById('login-page').classList.add('hidden');
  document.getElementById('main-layout').classList.add('active');
  document.getElementById('sidebar-user').textContent = USER || 'admin';
  switchModule(ACTIVE_MODULE);
  loadDashboardStats();
}
function switchModule(name) {
  ACTIVE_MODULE = name;
  document.querySelectorAll('.module-panel').forEach(function(p){ p.classList.remove('active'); });
  var target = document.getElementById('module-' + name);
  if (target) target.classList.add('active');
  document.querySelectorAll('.nav-item').forEach(function(n){
    n.classList.toggle('active', n.dataset.module === name);
  });
  if (name === 'nvr') activateSubPanel('gen');
  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('open');
}
function loadDashboardStats() {
  apiPost('/api/history', { page:1, size:1 }).then(function(r){
    if (r.ok) document.getElementById('stat-total').textContent = r.total || 0;
  });
  apiPost('/api/history', { page:1, size:1 }).then(function(r){
    if (r.ok && r.records && r.records.length>0) {
      document.getElementById('stat-last').textContent = r.records[0].machine_code;
    } else {
      document.getElementById('stat-last').textContent = '无';
    }
  });
}

// ==================== SUB-TABS ====================
function activateSubPanel(name) {
  document.querySelectorAll('#nvr-tabs .sub-tab').forEach(function(t){
    t.classList.toggle('active', t.dataset.panel === name);
  });
  document.querySelectorAll('.sub-panel').forEach(function(p){
    p.classList.toggle('active', p.id === 'panel-' + name);
  });
  if (name === 'history') loadHistory();
}
document.getElementById('nvr-tabs').addEventListener('click', function(e){
  if (e.target.classList.contains('sub-tab')) {
    activateSubPanel(e.target.dataset.panel);
  }
});

// ==================== NVR: GENERATE ====================
function doGenerate() {
  var mc = document.getElementById('gen-mc').value.trim();
  var type = document.getElementById('gen-type').value;
  var op = document.getElementById('gen-operator').value.trim();
  var box = document.getElementById('gen-result');
  if (!mc) { toast('请输入机器码','error'); return; }
  apiPost('/api/generate', { machine_code:mc, license_type:type, operator:op }).then(function(r){
    box.style.display = 'block';
    if (r.ok) {
      box.innerHTML = '<div style="margin-bottom:8px;color:var(--success);">&#10004; 生成成功</div>' +
        '<div><b>机器码:</b> ' + r.machine_code + '</div>' +
        '<div><b>注册码:</b> <span style="color:var(--accent);font-weight:600;">' + r.activation_key + '</span></div>' +
        '<div><b>类型:</b> ' + r.license_name + '&nbsp;&nbsp;<b>有效期:</b> ' + r.expiry_date + '</div>';
      toast('注册码已生成','success');
    } else {
      box.innerHTML = '<div style="color:var(--danger);">&#10008; ' + (r.error||'生成失败') + '</div>';
    }
  }).catch(function(){
    box.style.display='block'; box.innerHTML='<div style="color:var(--danger);">网络错误</div>';
  });
}

// ==================== NVR: BATCH ====================
function doBatch() {
  var codes = document.getElementById('batch-codes').value.trim();
  var type = document.getElementById('batch-type').value;
  var op = document.getElementById('batch-operator').value.trim();
  var box = document.getElementById('batch-result');
  if (!codes) { toast('请输入机器码','error'); return; }
  apiPost('/api/batch', { machine_codes:codes, license_type:type, operator:op }).then(function(r){
    box.style.display = 'block';
    if (r.ok && r.results) {
      var html = '<table style="width:100%;"><tr><th>机器码</th><th>注册码</th><th>状态</th></tr>';
      r.results.forEach(function(row){
        var status = row.ok ? '<span style="color:var(--success);">&#10004;</span>' : '<span style="color:var(--danger);">'+(row.error||'失败')+'</span>';
        html += '<tr><td class="code">'+row.machine_code+'</td><td class="code">'+(row.activation_key||'--')+'</td><td>'+status+'</td></tr>';
      });
      html += '</table>';
      box.innerHTML = html;
      toast('批量生成完成','success');
    } else {
      box.innerHTML = '<div style="color:var(--danger);">' + (r.error||'生成失败') + '</div>';
    }
  }).catch(function(){
    box.style.display='block'; box.innerHTML='<div style="color:var(--danger);">网络错误</div>';
  });
}

// ==================== NVR: VERIFY ====================
function doVerify() {
  var mc = document.getElementById('verify-mc').value.trim();
  var key = document.getElementById('verify-key').value.trim();
  var box = document.getElementById('verify-result');
  if (!mc || !key) { toast('请输入机器码和注册码','error'); return; }
  apiPost('/api/verify', { machine_code:mc, activation_key:key }).then(function(r){
    box.style.display = 'block';
    if (r.ok) {
      if (r.valid) {
        box.innerHTML = '<div style="color:var(--success);margin-bottom:8px;">&#10004; 验证通过</div>' +
          '<div><b>类型:</b> ' + r.license_name + '&nbsp;&nbsp;<b>有效期:</b> ' + r.expiry_date + '</div>';
      } else {
        box.innerHTML = '<div style="color:var(--danger);">&#10008; 验证失败: ' + (r.error||'注册码与机器码不匹配') + '</div>';
      }
    } else {
      box.innerHTML = '<div style="color:var(--danger);">' + (r.error||'验证出错') + '</div>';
    }
  }).catch(function(){
    box.style.display='block'; box.innerHTML='<div style="color:var(--danger);">网络错误</div>';
  });
}

// ==================== NVR: HISTORY ====================
function loadHistory() {
  apiPost('/api/history', { page:HIST_PAGE, size:HIST_SIZE }).then(function(r){
    var tbody = document.getElementById('history-tbody');
    var pager = document.getElementById('history-pager');
    if (r.ok) {
      if (r.records.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--text-muted);padding:24px;">暂无记录</td></tr>';
      } else {
        var typeLabel = { trial:'试用版', standard:'标准版', lifetime:'终身版' };
        var typeClass = { trial:'label-trial', standard:'label-standard', lifetime:'label-lifetime' };
        tbody.innerHTML = r.records.map(function(rec){
          return '<tr><td>'+rec.id+'</td>' +
            '<td class="code">'+rec.machine_code+'</td>' +
            '<td class="code">'+rec.activation_key+'</td>' +
            '<td><span class="label '+typeClass[rec.license_type]+'">'+typeLabel[rec.license_type]+'</span></td>' +
            '<td>'+rec.expiry_date+'</td>' +
            '<td>'+rec.operator+'</td>' +
            '<td style="font-size:11px;">'+rec.created_at+'</td>' +
            '<td><button class="btn btn-ghost btn-sm" style="color:var(--danger);" onclick="doDelete('+rec.id+')">删除</button></td></tr>';
        }).join('');
      }
      var totalPages = Math.ceil(r.total / HIST_SIZE);
      pager.innerHTML = '<button '+(HIST_PAGE<=1?'disabled':'')+' onclick="goPage('+(HIST_PAGE-1)+')">上一页</button>' +
        '<span>第 '+HIST_PAGE+' / '+totalPages+' 页 (共 '+r.total+' 条)</span>' +
        '<button '+(HIST_PAGE>=totalPages?'disabled':'')+' onclick="goPage('+(HIST_PAGE+1)+')">下一页</button>';
    } else {
      tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--danger);padding:24px;">加载失败: '+(r.error||'未知错误')+'</td></tr>';
    }
  }).catch(function(){
    document.getElementById('history-tbody').innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--danger);padding:24px;">网络错误</td></tr>';
  });
}
function goPage(p) {
  HIST_PAGE = p;
  loadHistory();
}
function doDelete(id) {
  if (!confirm('确定删除记录 #'+id+' 吗？')) return;
  apiPost('/api/delete', { id:id }).then(function(r){
    if (r.ok) { toast('已删除','success'); loadHistory(); }
    else toast('删除失败','error');
  });
}
function doClear() {
  if (!confirm('确定清空所有历史记录？此操作不可恢复！')) return;
  apiPost('/api/clear', {}).then(function(r){
    if (r.ok) { toast('已清空','success'); loadHistory(); }
    else toast('清空失败','error');
  });
}
function doExport() {
  apiPost('/api/export', {}).then(function(r){
    if (r.ok && r.csv) {
      var blob = new Blob(['\uFEFF'+r.csv], {type:'text/csv;charset=utf-8;'});
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'keygen_records_' + new Date().toISOString().slice(0,10) + '.csv';
      a.click();
      toast('CSV 已导出','success');
    } else toast('导出失败','error');
  });
}

// ==================== MODULE NAVIGATION ====================
document.querySelectorAll('.nav-item[data-module]').forEach(function(item){
  item.addEventListener('click', function(){
    var mod = this.dataset.module;
    if (!mod) return;
    switchModule(mod);
  });
});

// ==================== LOGOUT BUTTON ====================
document.getElementById('logout-btn').addEventListener('click', doLogout);

// ==================== MOBILE TOGGLE ====================
document.getElementById('mobile-toggle').addEventListener('click', function(){
  document.getElementById('sidebar').classList.toggle('open');
});
document.addEventListener('click', function(e){
  var sidebar = document.getElementById('sidebar');
  var toggle = document.getElementById('mobile-toggle');
  if (window.innerWidth <= 768 && sidebar.classList.contains('open') &&
      !sidebar.contains(e.target) && !toggle.contains(e.target)) {
    sidebar.classList.remove('open');
  }
});

// ==================== INIT ====================
(function init(){
  document.getElementById('login-pass').addEventListener('keydown', function(e){
    if (e.key === 'Enter') document.getElementById('login-form').dispatchEvent(new Event('submit'));
  });
  if (TOKEN) {
    // Verify existing token is still valid
    apiPost('/api/history', { page:1, size:1 }).then(function(r){
      if (r.ok) { showMain(); } else { TOKEN=null; showLogin(); }
    }).catch(function(){ showLogin(); });
  }
})();
</script>
</body>
</html>
